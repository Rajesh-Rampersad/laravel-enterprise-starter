# Docker Compose — Laravel Enterprise Starter
# Servicios: PHP 8.3-FPM, Nginx, PostgreSQL 16, Redis 7, ElasticSearch 8.x

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    container_name: laravel_enterprise_app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - pgsql
      - redis
      - elasticsearch
    networks:
      - enterprise-network

  web:
    image: nginx:alpine
    container_name: laravel_enterprise_web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - enterprise-network

  pgsql:
    image: postgres:16-alpine
    container_name: laravel_enterprise_pgsql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      POSTGRES_DB: ${DB_DATABASE:-enterprise_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    networks:
      - enterprise-network

  redis:
    image: redis:7-alpine
    container_name: laravel_enterprise_redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - enterprise-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: laravel_enterprise_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    deploy:
      resources:
        limits:
          memory: 1.5G
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - enterprise-network

networks:
  enterprise-network:
    driver: bridge

volumes:
  pgsql_data:
  redis_data:
  elasticsearch_data:
